name: film_randomized_mobile
description: Film Randomized — discover random movies and TV shows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  youtube_player_flutter: ^9.0.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1
  shimmer: ^3.0.0
  logger: ^2.5.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env